<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>계산기</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#dff7d8;
    font-family:"맑은 고딕";
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{

    width:470px;

    background:white;

    border-radius:20px;

    border:6px solid #2e7d32;

    padding:20px;

    box-shadow:0px 0px 25px gray;

}

.title{

    text-align:center;

    font-size:40px;

    color:#1b5e20;

    font-weight:bold;

}

.math{

    text-align:center;

    margin-top:8px;

    margin-bottom:15px;

    color:#388e3c;

    letter-spacing:8px;

    font-size:22px;

}

/* 계산기록 */

.history{

    height:150px;

    overflow-y:auto;

    border:2px solid #81c784;

    border-radius:10px;

    background:#f8fff6;

    padding:10px;

    margin-bottom:15px;

    font-size:18px;

}

.display{

    width:100%;

    height:65px;

    font-size:32px;

    text-align:right;

    padding:10px;

    border:3px solid #2e7d32;

    border-radius:10px;

    margin-bottom:20px;

}

/* 버튼 */

.buttons{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:10px;

}

button{

    height:60px;

    font-size:22px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    transition:.2s;

}

.num{

    background:#c8e6c9;

}

.op{

    background:#43a047;

    color:white;

}

.equal{

    background:#1565c0;

    color:white;

}

.clear{

    background:#e53935;

    color:white;

}

button:hover{

    transform:scale(1.05);

}

/* 이름 */

.footer{

    margin-top:20px;

    text-align:center;

    color:#1b5e20;

    font-size:26px;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="calculator">

<div class="title">

계산기

</div>

<div class="math">

π Σ √ ∫ Δ

</div>

<div class="history" id="history">

<b>계산과정</b><br>

</div>

<input class="display" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearAll()">C</button>

<button class="clear" onclick="back()">←</button>

<button class="op" onclick="add('%')">%</button>

<button class="op" onclick="add('/')">÷</button>

<button class="num" onclick="add('7')">7</button>
<button class="num" onclick="add('8')">8</button>
<button class="num" onclick="add('9')">9</button>
<button class="op" onclick="add('*')">×</button>

<button class="num" onclick="add('4')">4</button>
<button class="num" onclick="add('5')">5</button>
<button class="num" onclick="add('6')">6</button>
<button class="op" onclick="add('-')">−</button>

<button class="num" onclick="add('1')">1</button>
<button class="num" onclick="add('2')">2</button>
<button class="num" onclick="add('3')">3</button>
<button class="op" onclick="add('+')">+</button>

<button class="op" onclick="add('(')">(</button>
<button class="num" onclick="add('0')">0</button>
<button class="num" onclick="add('.')">.</button>
<button class="op" onclick="add(')')">)</button>

<button class="equal" style="grid-column:span 4;"
onclick="calc()">

= 계산하기

</button>

</div>

<div class="footer">

kimhyunnkhan

</div>

</div>

<script>

const display=document.getElementById("display");
const history=document.getElementById("history");

function add(v){

display.value+=v;

}

function back(){

display.value=display.value.slice(0,-1);

}

function clearAll(){

display.value="";

history.innerHTML="<b>계산과정</b><br>";

}

function calc(){

try{

let exp=display.value;

let result=eval(exp);

history.innerHTML+=exp+" = <b>"+result+"</b><br>";

history.scrollTop=history.scrollHeight;

display.value=result;

}

catch{

display.value="Error";

}

}

</script>

</body>
</html>
