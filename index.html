<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>계산기</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#DFF5D8;
    font-family:"맑은 고딕",sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

}

/* 계산기 */

.calculator{

    width:420px;

    background:white;

    border-radius:25px;

    padding:25px;

    box-shadow:0 0 30px rgba(0,0,0,.25);

    border:6px solid #2E7D32;

}

/* 제목 */

.title{

    text-align:center;

    font-size:42px;

    color:#1B5E20;

    font-weight:bold;

    margin-bottom:5px;

}

/* 수학 장식 */

.math{

    text-align:center;

    color:#2E7D32;

    font-size:22px;

    margin-bottom:20px;

    letter-spacing:8px;

}

/* 화면 */

#display{

    width:100%;

    height:70px;

    font-size:34px;

    text-align:right;

    padding:10px;

    border-radius:10px;

    border:3px solid #2E7D32;

    margin-bottom:20px;

    background:#F8FFF8;

}

/* 버튼 */

.buttons{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:12px;

}

button{

    height:65px;

    font-size:24px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-weight:bold;

    transition:.2s;

}

/* 숫자 */

.number{

    background:#A5D6A7;

}

/* 연산 */

.operator{

    background:#4CAF50;

    color:white;

}

/* 결과 */

.equal{

    background:#1565C0;

    color:white;

}

/* 삭제 */

.clear{

    background:#E53935;

    color:white;

}

/* 마우스 */

button:hover{

    transform:scale(1.05);

    box-shadow:0 0 10px rgba(0,0,0,.3);

}

/* 이름 */

.footer{

    text-align:center;

    margin-top:25px;

    color:#1B5E20;

    font-size:24px;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="calculator">

<div class="title">

계산기

</div>

<div class="math">

π &nbsp; Σ &nbsp; √ &nbsp; ∫ &nbsp; Δ

</div>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>

<button class="clear" onclick="backspace()">←</button>

<button class="operator" onclick="append('%')">%</button>

<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>

<button class="number" onclick="append('8')">8</button>

<button class="number" onclick="append('9')">9</button>

<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>

<button class="number" onclick="append('5')">5</button>

<button class="number" onclick="append('6')">6</button>

<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>

<button class="number" onclick="append('2')">2</button>

<button class="number" onclick="append('3')">3</button>

<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('0')">0</button>

<button class="number" onclick="append('.')">.</button>

<button class="equal" onclick="calculate()">=</button>

<button class="operator" onclick="append('(')">(</button>

<button class="operator" onclick="append(')')">)</button>

</div>

<div class="footer">

kimhyunnkhan

</div>

</div>

<script>

let display=document.getElementById("display");

function append(value){

display.value+=value;

}

function clearDisplay(){

display.value="";

}

function backspace(){

display.value=display.value.slice(0,-1);

}

function calculate(){

try{

display.value=eval(display.value);

}

catch{

display.value="Error";

}

}

</script>

</body>

</html>
